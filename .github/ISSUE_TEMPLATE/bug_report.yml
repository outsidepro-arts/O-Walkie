name: Bug report
description: Report a reproducible bug or regression
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: input
    id: component
    attributes:
      label: Component
      description: backend / android / windows-client
      placeholder: android
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      placeholder: Describe the bug and actual behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / recordings
      description: Paste logs or attach media if available.
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Android 14 / Windows 11 / Go version / app version
