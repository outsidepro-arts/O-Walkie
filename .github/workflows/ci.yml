name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Download dependencies
        run: go mod download
      - name: Build relay
        run: go build ./...

  android:
    name: Android Debug Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

  windows-prototype:
    name: Windows Prototype Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build Windows client prototype
        run: dotnet build "windows-client/src/OWalkie.Desktop.Wpf/OWalkie.Desktop.Wpf.csproj"

  flutter-client:
    name: Flutter client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter-client
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve version from git
        run: eval "$(./tool/version_from_git.sh)"
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test
