name: owalkie_app
description: O-Walkie cross-platform client (Flutter shell + owalkie-core FFI).
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  owalkie_core:
    path: packages/owalkie_core
  package_info_plus: ^8.3.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  vibration: ^3.1.3
  wakelock_plus: ^1.3.2
  audio_session: ^0.2.3
  app_links: ^7.1.2
  share_plus: ^12.0.2
  tray_manager: ^0.5.3
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/tray_icon.ico
