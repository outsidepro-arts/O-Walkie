name: owalkie_app
description: O-Walkie cross-platform client (Flutter shell + owalkie-core FFI).
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  owalkie_core:
    path: packages/owalkie_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
